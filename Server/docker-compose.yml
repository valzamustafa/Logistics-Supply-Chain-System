networks:
  logistics-network:
    driver: bridge

volumes:
  mssql-data:
  mongodb-data:

services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2019-latest  # Ndrysho nga 2022 në 2019
    container_name: logistics-mssql
    user: root
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourStrong!Password123"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    networks:
      - logistics-network
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/1433'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  mongodb:
    image: mongo:6
    container_name: logistics-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - logistics-network
    healthcheck:
      test: ["CMD-SHELL", "mongosh --eval 'db.runCommand(\"ping\").ok' --quiet || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Wait for SQL Server to be ready
  sql-ready:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql-ready-check
    depends_on:
      mssql:
        condition: service_healthy
    command: >
      bash -c "
        echo 'SQL Server is ready!' &&
        sleep 5
      "
    networks:
      - logistics-network
    profiles:
      - setup

  auth-service:
    build: ./services/auth-service
    container_name: auth-service
    depends_on:
      mssql:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Server=mssql;Database=AuthServiceDB;User Id=sa;Password=YourStrong!Password123;TrustServerCertificate=true;Encrypt=false
      - Jwt__Key=YourSuperSecretKeyForJWTThatIsAtLeast32CharactersLong123!
      - Jwt__Issuer=Logjistika
      - Jwt__Audience=LogjistikaClients
    ports:
      - "5001:80"
    networks:
      - logistics-network
    restart: unless-stopped

  product-service:
    build: ./services/product-service
    container_name: product-service
    depends_on:
      mssql:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Server=mssql;Database=ProductServiceDB;User Id=sa;Password=YourStrong!Password123;TrustServerCertificate=true;Encrypt=false
    ports:
      - "5005:80"
    networks:
      - logistics-network
    restart: unless-stopped

  order-service:
    build: ./services/order-service
    container_name: order-service
    depends_on:
      mssql:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Server=mssql;Database=OrderServiceDB;User Id=sa;Password=YourStrong!Password123;TrustServerCertificate=true;Encrypt=false
    ports:
      - "5002:80"
    networks:
      - logistics-network
    restart: unless-stopped

  inventory-service:
    build: ./services/inventory-service
    container_name: inventory-service
    depends_on:
      mssql:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Server=mssql;Database=InventoryServiceDB;User Id=sa;Password=YourStrong!Password123;TrustServerCertificate=true;Encrypt=false
    ports:
      - "5003:80"
    networks:
      - logistics-network
    restart: unless-stopped

  shipment-service:
    build: ./services/shipment-service
    container_name: shipment-service
    depends_on:
      mssql:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Server=mssql;Database=ShipmentServiceDB;User Id=sa;Password=YourStrong!Password123;TrustServerCertificate=true;Encrypt=false
    ports:
      - "5004:80"
    networks:
      - logistics-network
    restart: unless-stopped

  warehouse-service:
    build: ./services/warehouse-service
    container_name: warehouse-service
    depends_on:
      mssql:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Server=mssql;Database=WarehouseServiceDB;User Id=sa;Password=YourStrong!Password123;TrustServerCertificate=true;Encrypt=false
    ports:
      - "5006:80"
    networks:
      - logistics-network
    restart: unless-stopped

  notification-service:
    build: ./services/notification-service
    container_name: notification-service
    depends_on:
      mssql:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__NotificationDB=Server=mssql;Database=NotificationDB;User Id=sa;Password=YourStrong!Password123;TrustServerCertificate=true;Encrypt=false
    ports:
      - "5009:80"
    networks:
      - logistics-network
    restart: unless-stopped

  report-service:
    build: ./services/report-service
    container_name: report-service
    depends_on:
      mssql:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__ReportDB=Server=mssql;Database=ReportDB;User Id=sa;Password=YourStrong!Password123;TrustServerCertificate=true;Encrypt=false
    ports:
      - "5008:80"
    networks:
      - logistics-network
    restart: unless-stopped

  supplier-service:
    build: ./services/supplier-service
    container_name: supplier-service
    depends_on:
      mssql:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__SupplierDB=Server=mssql;Database=SupplierDB;User Id=sa;Password=YourStrong!Password123;TrustServerCertificate=true;Encrypt=false
    ports:
      - "5007:80"
    networks:
      - logistics-network
    restart: unless-stopped

  tracking-services:
    build: ./services/tracking-services
    container_name: tracking-services
    depends_on:
      mssql:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__TrackingDB=Server=mssql;Database=TrackingDB;User Id=sa;Password=YourStrong!Password123;TrustServerCertificate=true;Encrypt=false
      - ConnectionStrings__MongoDB=mongodb://mongodb:27017
    ports:
      - "5010:80"
    networks:
      - logistics-network
    restart: unless-stopped

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    depends_on:
      - auth-service
      - product-service
      - order-service
      - inventory-service
      - shipment-service
      - warehouse-service
      - notification-service
      - report-service
      - supplier-service
      - tracking-services
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
    ports:
      - "5000:80"
    networks:
      - logistics-network
    restart: unless-stopped